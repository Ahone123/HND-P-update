<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Report Status | CleanCity</title>
    <link rel="stylesheet" href="report_status.css">
</head>
<body>

<div class="dashboard">

    <div class="sidebar">
        <h2 class="logo">CleanCity</h2>
        <ul>
            <li>🏠 Home</li>
            <li class="active">📄 My Reports</li>
            <li>💳 Payment Status</li>
        </ul>
    </div>

    <div class="main-content">
        <h1>Report Status</h1>

        <div class="report-images">
            <div class="image-box">
                <p>Before image</p>
                <input type="file"  class="placeholder">
            </div>
            <div class="image-box">
                <p>After image</p>
                <div class="placeholder"></div>
            </div>
        </div>

        <p class="report-status">Status: <span class="completed">Completed</span></p>

        <button class="payment-btn">Make Payment</button>
    </div>

</div>

</body>
</html>
