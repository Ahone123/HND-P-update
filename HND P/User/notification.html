<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notifications | CleanCity</title>
    <link rel="stylesheet" href="notification.css">
</head>
<body>

<div class="container">
    <h1>Notifications</h1>

    <div class="notification success">
        <span>✅</span>
        <p>Your waste report has been assigned to a driver.</p>
    </div>

    <div class="notification info">
        <span>🚛</span>
        <p>Your waste has been collected successfully.</p>
    </div>

    <div class="notification warning">
        <span>💳</span>
        <p>Payment pending for report ID #002.</p>
    </div>

</div>

</body>
</html>
